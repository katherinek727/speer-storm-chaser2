apply plugin: "com.android.application"
apply plugin: "kotlin-android"

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.stormchaser"
    defaultConfig {
        applicationId "com.stormchaser"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        
        // Configure react-native-camera variant
        missingDimensionStrategy 'react-native-camera', 'general'
        
        // Configure react-native-maps
        missingDimensionStrategy 'react-native-maps', 'release'
        
        // Configure vector icons
        vectorDrawables.useSupportLibrary = true
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // React Native dependencies - from local node_modules
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    
    // React Native libraries
    implementation project(':react-native-maps')
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-permissions')
    implementation project(':@react-native-async-storage_async-storage')
    implementation project(':react-native-camera')
    implementation project(':react-native-splash-screen')
    implementation project(':react-native-gesture-handler')
    
    // Add these for compatibility
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.9.0"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.vectordrawable:vectordrawable:1.1.0"
    implementation "androidx.vectordrawable:vectordrawable-animated:1.1.0"
    
    // Kotlin dependencies - match with root project
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.0"
}

// Force all React Native dependencies to use specific version
configurations.all {
    resolutionStrategy {
        // Force specific versions for React Native
        force "com.facebook.react:react-android:0.72.10"
        force "com.facebook.react:hermes-android:0.72.10"
        
        // Replace any react-native dependency with react-android (including transitive)
        eachDependency { details ->
            if (details.requested.group == 'com.facebook.react') {
                if (details.requested.name == 'react-native' || details.requested.name == 'react-android') {
                    details.useVersion "0.72.10"
                    details.useTarget "com.facebook.react:react-android:0.72.10"
                    details.because "Force React Native version 0.72.10 for consistency"
                }
            }
        }
        
        // AndroidX dependencies
        force "androidx.appcompat:appcompat:1.6.1"
        force "androidx.core:core-ktx:1.12.0"
        force "androidx.vectordrawable:vectordrawable:1.1.0"
        force "androidx.vectordrawable:vectordrawable-animated:1.1.0"
        force "com.google.android.material:material:1.9.0"
        
        // Legacy support libraries replacement (for react-native-splash-screen)
        force "com.android.support:appcompat-v7:28.0.0"
        force "com.android.support:support-v4:28.0.0"
        force "com.android.support:support-annotations:28.0.0"
        force "com.android.support:support-vector-drawable:28.0.0"
        force "com.android.support:animated-vector-drawable:28.0.0"
        force "com.android.support:support-media-compat:28.0.0"
        force "com.android.support:support-core-utils:28.0.0"
        force "com.android.support:support-core-ui:28.0.0"
        force "com.android.support:support-fragment:28.0.0"
        force "com.android.support:support-compat:28.0.0"
    }
}