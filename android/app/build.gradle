apply plugin: "com.android.application"
apply plugin: "kotlin-android"

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.stormchaser"
    defaultConfig {
        applicationId "com.stormchaser"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        
        // Configure react-native-camera variant
        missingDimensionStrategy 'react-native-camera', 'general'
        
        // Configure react-native-maps
        missingDimensionStrategy 'react-native-maps', 'release'
        
        // Configure vector icons
        vectorDrawables.useSupportLibrary = true
        
        // 16KB page alignment for Android 14+ compatibility
        externalNativeBuild {
            cmake {
                cppFlags "-Wl,-z,max-page-size=16384"
                arguments "-DANDROID_PLATFORM=android-21"
            }
        }
        
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    
    kotlinOptions {
        jvmTarget = '11'
    }
}

dependencies {
    // React Native dependencies with explicit versions
    implementation("com.facebook.react:react-android:0.72.10")
    
    // Hermes or JSC
    def isHermesEnabled = hermesEnabled.toBoolean()
    if (isHermesEnabled) {
        implementation("com.facebook.react:hermes-android:0.72.10")
    } else {
        implementation jscFlavor
    }
    
    // React Native libraries
    implementation project(':react-native-maps')
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-permissions')
    implementation project(':@react-native-async-storage_async-storage')
    implementation project(':react-native-camera')
    implementation project(':react-native-gesture-handler')
    
    // Add these for compatibility
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.9.0"
    implementation "androidx.core:core-ktx:1.9.0"
    implementation "androidx.vectordrawable:vectordrawable:1.1.0"
    implementation "androidx.vectordrawable:vectordrawable-animated:1.1.0"
    
    // Kotlin dependencies - match with root project
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.0"
}

