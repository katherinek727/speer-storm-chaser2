// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 33
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.8.0"
    }
    repositories {
        // Primary repositories - Google first
        google()
        maven { url "https://maven.google.com" }
        
        // Local Maven repository
        maven { url "${System.properties['user.home']}/.m2/repository" }
        
        // React Native
        maven { url "$rootDir/../node_modules/react-native/android" }
        maven { url "https://jitpack.io" }
        
        // Central repositories
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion")
    }
}

// Apply Kotlin JVM target globally
allprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            android {
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
            }
        }
    }
}

// Apply global resolution strategy to all projects
subprojects { subproject ->
    afterEvaluate {
        if ((subproject.plugins.hasPlugin('android') || subproject.plugins.hasPlugin('android-library'))) {
            configurations.all {
                resolutionStrategy {
                    // Handle react-native:+ dependencies in all modules
                    eachDependency { details ->
                        if (details.requested.group == 'com.facebook.react' && details.requested.name == 'react-native') {
                            details.useTarget "com.facebook.react:react-android:0.72.10"
                            details.because "react-native artifact is deprecated, use react-android instead"
                        }
                    }
                    
                    // Also handle react-android and hermes-android without version
                    eachDependency { details ->
                        if (details.requested.group == 'com.facebook.react') {
                            if (details.requested.name == 'react-android' && details.requested.version == null) {
                                details.useVersion "0.72.10"
                                details.because "react-android requires explicit version"
                            }
                            if (details.requested.name == 'hermes-android' && details.requested.version == null) {
                                details.useVersion "0.72.10"
                                details.because "hermes-android requires explicit version"
                            }
                        }
                    }
                }
            }
        }
    }
}


allprojects {
    repositories {
        // Primary repositories
        google()
        maven { url "https://maven.google.com" }
        
        // JitPack
        maven { url "https://jitpack.io" }
        
        // React Native from local node_modules (MUST be before mavenCentral)
        maven {
            url "$rootDir/../node_modules/react-native/android"
        }
        maven {
            // Android JSC is installed from npm
            url "$rootDir/../node_modules/jsc-android/dist"
        }
        
        // Central repositories
        mavenCentral()
    }
}